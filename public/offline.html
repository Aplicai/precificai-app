<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sem conexão · Precificaí</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F4F6F5; color: #1A2B2A; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; padding: 32px 28px; border-radius: 14px; max-width: 340px; text-align: center; box-shadow: 0 4px 20px rgba(0,77,71,0.08); }
    h1 { color: #004d47; font-size: 18px; margin: 0 0 8px; }
    p { color: #6B7D7B; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
    button { background: #004d47; color: #fff; border: 0; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sem conexão</h1>
    <p>Você está offline. Algumas telas em cache podem funcionar — tente voltar ou recarregue quando conectar.</p>
    <button onclick="location.reload()">Recarregar</button>
  </div>
</body>
</html>

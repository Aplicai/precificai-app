<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precificaí — ID Visual</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f2f1; padding: 30px; }
    h1 { text-align: center; color: #004d47; margin-bottom: 6px; font-size: 28px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
    .section-title {
      font-size: 13px; font-weight: 700; color: #004d47; text-transform: uppercase;
      letter-spacing: 2px; margin: 30px 0 14px; padding-bottom: 8px;
      border-bottom: 2px solid #004d47; max-width: 1200px; margin-left: auto; margin-right: auto;
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 20px; max-width: 1200px; margin: 0 auto 20px;
    }
    .card {
      background: white; border-radius: 14px; padding: 20px;
      box-shadow: 0 2px 10px rgba(0,77,71,0.08); border: 1px solid #e8ece8;
    }
    .card-title { font-size: 12px; font-weight: 700; color: #6B7D7B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .card-info { font-size: 11px; color: #aaa; margin-bottom: 10px; }
    .preview-area {
      display: flex; align-items: center; justify-content: center;
      min-height: 140px; border-radius: 10px; margin-bottom: 12px; overflow: hidden;
    }
    .preview-area.checker {
      background-image: linear-gradient(45deg,#e8e8e8 25%,transparent 25%),linear-gradient(-45deg,#e8e8e8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e8e8e8 75%),linear-gradient(-45deg,transparent 75%,#e8e8e8 75%);
      background-size: 14px 14px; background-position: 0 0,0 7px,7px -7px,-7px 0;
    }
    .preview-area.white { background: #fff; border: 1px solid #eee; }
    .preview-area.green { background: #004d47; }
    .preview-area.dark { background: #1a1a1a; }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      padding: 5px 12px; border: none; border-radius: 6px; font-size: 11px;
      font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-green { background: #004d47; color: white; }
    .btn-blue { background: #265bb0; color: white; }
    .btn-orange { background: #e3b842; color: #004d47; }

    .download-all { text-align: center; margin: 20px 0 10px; }
    .download-all .btn { font-size: 14px; padding: 10px 28px; border-radius: 10px; }
    .color-note { text-align: center; font-size: 12px; color: #6B7D7B; margin-bottom: 20px; }
    .color-chips { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .chip { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; }
    .chip span { display: inline-block; width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<h1>Precificaí — Identidade Visual</h1>
<p class="subtitle">Logomarcas para exportação em PNG de alta resolução</p>

<div class="color-chips">
  <div class="chip"><span style="background:#004d47"></span> Verde #004d47</div>
  <div class="chip"><span style="background:#265bb0"></span> Azul #265bb0</div>
  <div class="chip"><span style="background:#e3b842"></span> Amarelo #e3b842</div>
  <div class="chip"><span style="background:#e3704d"></span> Coral #e3704d</div>
  <div class="chip"><span style="background:#6a4fb0"></span> Roxo #6a4fb0</div>
  <div class="chip"><span style="background:#c74040"></span> Vermelho #c74040</div>
</div>

<div class="download-all">
  <button class="btn btn-green" onclick="downloadAll()">⬇ Baixar Todos os PNGs (1x, 2x e 4x)</button>
</div>

<div id="app"></div>

<script>
// ============ BRAND COLORS ============
const BRAND = {
  green: '#004d47',
  blue: '#265bb0',
  yellow: '#e3b842',
  white: '#FFFFFF',
  dark: '#1a1a1a',
};

// ============ EXACT SVG PATHS FROM APLICAÍ ============
const PATHS = {
  a: 'm1017.3,110.33l-4.61,39.66,4.61,39.75c.48,4.13-2.75,7.76-6.91,7.76h-9.94c-6.35,0-11.7-4.76-12.44-11.07l-1.21-10.31c-4.73,7.57-10.7,13.44-17.91,17.62s-15.21,6.26-24,6.26-17.36-2.09-24.54-6.26c-7.18-4.17-12.76-10.05-16.74-17.62-3.98-7.57-5.97-16.25-5.97-26.05s1.99-18.58,5.97-26.17c3.98-7.6,9.55-13.48,16.7-17.66,7.15-4.17,15.35-6.26,24.59-6.26s16.79,2.07,24,6.22c7.21,4.15,13.21,10,17.99,17.57l1.15-10.1c.72-6.33,6.08-11.1,12.44-11.1h9.9c4.16,0,7.39,3.63,6.91,7.76Zm-49.94,64.37c4.67-2.39,8.78-5.72,12.31-9.98,3.54-4.26,6.3-9.14,8.31-14.65-2-5.51-4.77-10.41-8.31-14.69-3.54-4.28-7.64-7.64-12.31-10.06-4.67-2.42-9.6-3.63-14.78-3.63s-9.7,1.21-13.73,3.63c-4.04,2.42-7.19,5.79-9.48,10.1-2.28,4.31-3.42,9.2-3.42,14.65s1.14,10.32,3.42,14.61c2.28,4.29,5.44,7.63,9.48,10.02,4.04,2.39,8.61,3.59,13.73,3.59s10.1-1.2,14.78-3.59Z',
  iStem: 'm1034.96,190.54v-80.64c0-4.36,3.97-7.65,8.26-6.83l5.77,1.1,5.68-1.09c4.29-.82,8.27,2.47,8.27,6.83v80.64c0,3.84-3.11,6.96-6.96,6.96h-14.05c-3.84,0-6.96-3.11-6.96-6.96Z',
  iLeaf: 'm1074.41,67.87l-26.95,8.63c-3.17,1.01-5.64,3.52-6.6,6.71l-1.49,4.92c-.76,2.52,1.4,4.96,4,4.49l19.24-3.45c5.5-.99,10.11-4.7,12.25-9.86l3.13-7.55c.95-2.29-1.21-4.64-3.57-3.88Z'
};

// Actual bounding box of "aí" from original SVG analysis:
// a: x=[893.0, 1017.3]  í_stem: x=[1029.3, 1057.3]  í_leaf: x=[1038.6, 1078.9]
// y range: ~67.87 (leaf top) to ~197.5 (stem/a bottom)
// "a" body y: ~97.8 to 197.5 → height ≈ 99.7
// In original SVG, gap c→a = 4.0 units, total "aí" width ≈ 185.9

const AI_VB = { x: 893, y: 66, w: 188, h: 134 };
// a body occupies roughly y=97.8 to y=197.5 within this viewBox → body height = 99.7
// The a body's bottom is at ~197.5, top of body at ~97.8

// ============ CANVAS RENDERING ============
function drawTextNoLigature(ctx, text, x, baseline, fontSize, color) {
  // Draw text splitting at "fi" to prevent DM Sans fi-ligature
  ctx.font = '800 ' + fontSize + 'px "DM Sans"';
  ctx.fillStyle = color;
  ctx.textBaseline = 'alphabetic';

  // Split "Precific" into "Preci" + "f" + "ic" to avoid fi ligature
  // We draw char by char for the problematic section
  const parts = [];
  let remaining = text;
  while (remaining.length > 0) {
    const fiIdx = remaining.indexOf('fi');
    if (fiIdx >= 0) {
      if (fiIdx > 0) parts.push(remaining.substring(0, fiIdx));
      parts.push('f');
      parts.push('i');
      remaining = remaining.substring(fiIdx + 2);
    } else {
      parts.push(remaining);
      remaining = '';
    }
  }

  let curX = x;
  for (const part of parts) {
    ctx.fillText(part, curX, baseline);
    curX += ctx.measureText(part).width;
  }
  return curX - x; // total width drawn
}

function drawLogo(canvas, fontSize, textColor, leafColor, bgColor, padding) {
  const ctx = canvas.getContext('2d');
  const padX = padding || fontSize * 0.6;
  const padY = padding || fontSize * 0.5;

  // Measure text width (char by char to avoid ligature in measurement too)
  ctx.font = '800 ' + fontSize + 'px "DM Sans"';
  let textW = 0;
  for (const ch of 'Precific') {
    textW += ctx.measureText(ch).width;
  }

  // Scale "aí" to match text x-height
  // DM Sans 800 x-height ratio ≈ 0.54 of fontSize
  const xHeight = fontSize * 0.54;
  // In SVG, "a" body height is ~99.7 units. We want it to match xHeight.
  const svgScale = xHeight / 99.7;
  const aiW = AI_VB.w * svgScale;
  const aiH = AI_VB.h * svgScale;

  // The gap between "c" end and "aí" start should match natural letter spacing
  // In DM Sans ExtraBold, tracking is tight. Use ~0.5px natural gap.
  const gap = fontSize * 0.005;

  const totalW = padX + textW + gap + aiW + padX;
  const totalH = padY + fontSize * 1.0 + padY;

  canvas.width = Math.ceil(totalW);
  canvas.height = Math.ceil(totalH);

  const ctx2 = canvas.getContext('2d');

  // Background
  if (bgColor) {
    ctx2.fillStyle = bgColor;
    ctx2.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
  }

  // Baseline position
  const baseline = padY + fontSize * 0.77;

  // Draw "Precific" text — split to avoid fi ligature
  drawTextNoLigature(ctx2, 'Precific', padX, baseline, fontSize, textColor);

  // Position "aí" SVG paths
  // The "a" body bottom is at y=197.5 in viewBox, which should align with baseline
  const aBodyBottom = 197.5;
  const aiX = padX + textW + gap;
  const aiY = baseline - (aBodyBottom - AI_VB.y) * svgScale;

  ctx2.save();
  ctx2.translate(aiX, aiY);
  ctx2.scale(svgScale, svgScale);
  ctx2.translate(-AI_VB.x, -AI_VB.y);

  // Draw "a"
  ctx2.fillStyle = textColor;
  ctx2.fill(new Path2D(PATHS.a), 'evenodd');

  // Draw "í" stem
  ctx2.fill(new Path2D(PATHS.iStem));

  // Draw "í" leaf
  ctx2.fillStyle = leafColor;
  ctx2.fill(new Path2D(PATHS.iLeaf));

  ctx2.restore();

  return { width: canvas.width, height: canvas.height };
}

function drawIcon(canvas, fontSize, textColor, leafColor, bgColor, padding) {
  const ctx = canvas.getContext('2d');
  const pad = padding || fontSize * 0.4;
  const xHeight = fontSize * 0.54;
  const svgScale = xHeight / 99.7;
  const aiW = AI_VB.w * svgScale;
  const aiH = AI_VB.h * svgScale;

  canvas.width = Math.ceil(aiW + pad * 2);
  canvas.height = Math.ceil(aiH + pad * 2);

  const ctx2 = canvas.getContext('2d');
  if (bgColor) { ctx2.fillStyle = bgColor; ctx2.fillRect(0, 0, canvas.width, canvas.height); }
  else { ctx2.clearRect(0, 0, canvas.width, canvas.height); }

  ctx2.save();
  ctx2.translate(pad, pad);
  ctx2.scale(svgScale, svgScale);
  ctx2.translate(-AI_VB.x, -AI_VB.y);
  ctx2.fillStyle = textColor;
  ctx2.fill(new Path2D(PATHS.a), 'evenodd');
  ctx2.fill(new Path2D(PATHS.iStem));
  ctx2.fillStyle = leafColor;
  ctx2.fill(new Path2D(PATHS.iLeaf));
  ctx2.restore();
}

function drawLeaf(canvas, fontSize, leafColor, bgColor) {
  const pad = fontSize * 0.5;
  const scale = fontSize * 0.54 / 99.7;
  const leafVB = { x: 1038, y: 66, w: 42, h: 28 };
  const w = leafVB.w * scale;
  const h = leafVB.h * scale;
  canvas.width = Math.ceil(w + pad * 2);
  canvas.height = Math.ceil(h + pad * 2);
  const ctx = canvas.getContext('2d');
  if (bgColor) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height); }
  else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
  ctx.save();
  ctx.translate(pad, pad);
  ctx.scale(scale, scale);
  ctx.translate(-leafVB.x, -leafVB.y);
  ctx.fillStyle = leafColor;
  ctx.fill(new Path2D(PATHS.iLeaf));
  ctx.restore();
}

// ============ CONFIGURATIONS ============
const sections = [
  {
    title: 'Logo Horizontal — Principal',
    items: [
      { name: 'Verde sobre transparente', file: 'precificai-horizontal-verde', text: BRAND.green, leaf: BRAND.yellow, bg: null, previewBg: 'checker' },
      { name: 'Verde sobre branco', file: 'precificai-horizontal-verde-branco', text: BRAND.green, leaf: BRAND.yellow, bg: BRAND.white, previewBg: 'white' },
      { name: 'Branco sobre verde', file: 'precificai-horizontal-branco-verde', text: BRAND.white, leaf: BRAND.yellow, bg: BRAND.green, previewBg: 'green' },
      { name: 'Branco sobre transparente', file: 'precificai-horizontal-branco', text: BRAND.white, leaf: BRAND.yellow, bg: null, previewBg: 'checker' },
      { name: 'Branco sobre escuro', file: 'precificai-horizontal-branco-escuro', text: BRAND.white, leaf: BRAND.yellow, bg: BRAND.dark, previewBg: 'dark' },
    ]
  },
  {
    title: 'Logo Horizontal — Monocromática',
    items: [
      { name: 'Verde monocromática', file: 'precificai-mono-verde', text: BRAND.green, leaf: BRAND.green, bg: BRAND.white, previewBg: 'white' },
      { name: 'Branca monocromática', file: 'precificai-mono-branco', text: BRAND.white, leaf: BRAND.white, bg: BRAND.green, previewBg: 'green' },
    ]
  },
  {
    title: 'Ícone "aí"',
    items: [
      { name: 'Verde com folha amarela', file: 'precificai-icone-ai-verde', text: BRAND.green, leaf: BRAND.yellow, bg: null, previewBg: 'checker', icon: true },
      { name: 'Branco com folha amarela', file: 'precificai-icone-ai-branco', text: BRAND.white, leaf: BRAND.yellow, bg: BRAND.green, previewBg: 'green', icon: true },
      { name: 'Verde monocromático', file: 'precificai-icone-ai-mono', text: BRAND.green, leaf: BRAND.green, bg: null, previewBg: 'checker', icon: true },
    ]
  },
  {
    title: 'Ícone Folha',
    items: [
      { name: 'Folha amarela', file: 'precificai-folha-amarela', leaf: BRAND.yellow, bg: null, previewBg: 'checker', leafOnly: true },
      { name: 'Folha verde', file: 'precificai-folha-verde', leaf: BRAND.green, bg: null, previewBg: 'checker', leafOnly: true },
      { name: 'Folha branca sobre verde', file: 'precificai-folha-branca', leaf: BRAND.white, bg: BRAND.green, previewBg: 'green', leafOnly: true },
    ]
  }
];

// ============ BUILD UI ============
function buildUI() {
  const app = document.getElementById('app');

  sections.forEach(section => {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = section.title;
    app.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    section.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<div class="card-title">' + item.name + '</div>' +
        '<div class="card-info">' + item.file + '.png</div>';

      const preview = document.createElement('div');
      preview.className = 'preview-area ' + item.previewBg;

      const canvas = document.createElement('canvas');
      canvas.style.maxWidth = '100%';
      canvas.style.height = 'auto';

      if (item.leafOnly) {
        drawLeaf(canvas, 120, item.leaf, item.bg);
      } else if (item.icon) {
        drawIcon(canvas, 120, item.text, item.leaf, item.bg, 40);
      } else {
        drawLogo(canvas, 72, item.text, item.leaf, item.bg, 30);
      }

      preview.appendChild(canvas);
      card.appendChild(preview);

      // Buttons
      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';

      [{label:'PNG 1x', scale:1, fmt:'png', cls:'btn-green'},
       {label:'PNG 2x', scale:2, fmt:'png', cls:'btn-blue'},
       {label:'PNG 4x', scale:4, fmt:'png', cls:'btn-blue'}
      ].forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn ' + b.cls;
        btn.textContent = b.label;
        btn.onclick = () => exportItem(item, b.scale, b.fmt);
        btnRow.appendChild(btn);
      });

      if (item.bg) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-orange';
        btn.textContent = 'JPG 2x';
        btn.onclick = () => exportItem(item, 2, 'jpg');
        btnRow.appendChild(btn);
      }

      card.appendChild(btnRow);
      grid.appendChild(card);
    });

    app.appendChild(grid);
  });
}

function exportItem(item, scale, fmt) {
  const canvas = document.createElement('canvas');
  const fontSize = 72 * scale;
  const pad = 30 * scale;

  if (item.leafOnly) {
    drawLeaf(canvas, 120 * scale, item.leaf, fmt === 'jpg' ? (item.bg || '#FFFFFF') : item.bg);
  } else if (item.icon) {
    drawIcon(canvas, 120 * scale, item.text, item.leaf, fmt === 'jpg' ? (item.bg || '#FFFFFF') : item.bg, 40 * scale);
  } else {
    drawLogo(canvas, fontSize, item.text, item.leaf, fmt === 'jpg' ? (item.bg || '#FFFFFF') : item.bg, pad);
  }

  const suffix = scale > 1 ? '@' + scale + 'x' : '';
  const ext = fmt === 'jpg' ? 'jpeg' : 'png';
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = item.file + suffix + '.' + (fmt === 'jpg' ? 'jpg' : 'png');
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/' + ext, fmt === 'jpg' ? 0.95 : undefined);
}

async function downloadAll() {
  const allItems = sections.flatMap(s => s.items);
  for (const item of allItems) {
    exportItem(item, 1, 'png');
    await new Promise(r => setTimeout(r, 300));
    exportItem(item, 2, 'png');
    await new Promise(r => setTimeout(r, 300));
    exportItem(item, 4, 'png');
    await new Promise(r => setTimeout(r, 300));
  }
}

// Wait for font to load
document.fonts.ready.then(() => {
  // Force font load
  const test = document.createElement('span');
  test.style.fontFamily = '"DM Sans"';
  test.style.fontWeight = '800';
  test.style.position = 'absolute';
  test.style.left = '-9999px';
  test.textContent = 'Precific test';
  document.body.appendChild(test);

  setTimeout(() => {
    document.body.removeChild(test);
    buildUI();
  }, 500);
});
</script>
</body>
</html>
